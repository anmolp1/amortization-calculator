<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Loan Amortization Calculator</title>
    <!-- Favicon from Google Material Icons -->
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <!-- Google Font for a futuristic look -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body {
        font-family: 'Bruno Ace SC', serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color: #fff;
        padding-top: 50px;
      }
      .container {
        max-width: 800px;
      }
      h1 {
        text-align: center;
        margin-bottom: 30px;
      }
      .form-label {
        font-weight: bold;
      }
      .form-control {
        border-radius: 5px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.3);
        color: #fff;
      }
      .form-control:focus {
        box-shadow: 0 0 8px rgba(31, 142, 241, 0.8);
        border-color: #1f8ef1;
      }
      /* Info icon tooltip styling */
      .info-icon {
        margin-left: 5px;
        color: #1f8ef1;
        cursor: pointer;
        position: relative;
        font-weight: bold;
      }
      .info-icon::after {
        content: attr(data-tooltip);
        background: rgba(0, 0, 0, 0.8);
        color: #fff;
        padding: 5px 10px;
        border-radius: 5px;
        position: absolute;
        white-space: nowrap;
        left: 50%;
        bottom: 125%;
        transform: translateX(-50%);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s;
        z-index: 1000;
      }
      .info-icon:hover::after {
        opacity: 1;
      }
      /* New Calculate Button styling from Uiverse.io by vinodjangid07 */
      .Btn-Container {
        display: flex;
        width: 170px;
        height: fit-content;
        background-color: #1d2129;
        border-radius: 40px;
        box-shadow: 0px 5px 10px #bebebe;
        justify-content: space-between;
        align-items: center;
        border: none;
        cursor: pointer;
        padding: 5px;
      }
      .icon-Container {
        width: 45px;
        height: 45px;
        background-color: #f59aff;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        border: 3px solid #1d2129;
      }
      .text {
        width: calc(170px - 45px);
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 1.1em;
        letter-spacing: 1.2px;
      }
      .icon-Container svg {
        transition-duration: 1.5s;
      }
      .Btn-Container:hover .icon-Container svg {
        transition-duration: 1.5s;
        animation: arrow 1s linear infinite;
      }
      @keyframes arrow {
        0% {
          opacity: 0;
          margin-left: 0px;
        }
        100% {
          opacity: 1;
          margin-left: 10px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>
        <img src="{{ url_for('static', filename='favicon.png') }}" alt="Favicon" style="width:30px; height:30px; vertical-align:middle; margin-right:10px;">
        <b>Loan Amortization Calculator</b>
      </h1>
      
      <form method="post" class="row g-3">
        <div class="col-md-6">
          <label for="principal" class="form-label">
            Total Loan Amount:
            <span class="info-icon" data-tooltip="Enter the total amount of the loan.">?</span>
          </label>
          <input type="number" step="0.01" class="form-control" name="principal" id="principal" required>
        </div>
        <div class="col-md-6">
          <label for="annual_rate" class="form-label">
            Annual Interest Rate (%):
            <span class="info-icon" data-tooltip="The yearly interest rate as a percentage.">?</span>
          </label>
          <input type="number" step="0.01" class="form-control" name="annual_rate" id="annual_rate" required>
        </div>
        <div class="col-md-6">
          <label for="years" class="form-label">
            Loan Tenure (years):
            <span class="info-icon" data-tooltip="Duration of the loan in years.">?</span>
          </label>
          <input type="number" class="form-control" name="years" id="years" required>
        </div>
        <div class="col-md-6">
          <label for="extra_emis" class="form-label">
            Extra EMIs per Year:
            <span class="info-icon" data-tooltip="Number of extra payments you can make annually.">?</span>
          </label>
          <input type="number" class="form-control" name="extra_emis" id="extra_emis" required>
        </div>
        <div class="col-md-6">
          <label for="step_up_percent" class="form-label">
            Step-up Percentage for EMI (%):
            <span class="info-icon" data-tooltip="Percentage by which your EMI increases each year.">?</span>
          </label>
          <input type="number" step="0.01" class="form-control" name="step_up_percent" id="step_up_percent" required>
        </div>
        <div class="col-12 d-flex justify-content-center">
          <!-- New styled Calculate button -->
          <button type="submit" class="Btn-Container">
            <span class="text">Calculate</span>
            <span class="icon-Container">
              <svg
                width="16"
                height="19"
                viewBox="0 0 16 19"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <circle cx="1.61321" cy="1.61321" r="1.5" fill="black"></circle>
                <circle cx="5.73583" cy="1.61321" r="1.5" fill="black"></circle>
                <circle cx="5.73583" cy="5.5566" r="1.5" fill="black"></circle>
                <circle cx="9.85851" cy="5.5566" r="1.5" fill="black"></circle>
                <circle cx="9.85851" cy="9.5" r="1.5" fill="black"></circle>
                <circle cx="13.9811" cy="9.5" r="1.5" fill="black"></circle>
                <circle cx="5.73583" cy="13.4434" r="1.5" fill="black"></circle>
                <circle cx="9.85851" cy="13.4434" r="1.5" fill="black"></circle>
                <circle cx="1.61321" cy="17.3868" r="1.5" fill="black"></circle>
                <circle cx="5.73583" cy="17.3868" r="1.5" fill="black"></circle>
              </svg>
            </span>
          </button>
        </div>
      </form>
    </div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
